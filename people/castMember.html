<!DOCTYPE html>
<html lang="en">
  <head>
    <title>Celestial Cinema</title>

    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#7345cc">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <link rel="icon" type="image/png" href="../images/favicon.png">
    <link rel="icon" type="image/svg+xml" href="../images/favicon.svg" />
    <link rel="shortcut icon" href="../images/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="../images/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-title" content="CCMDb" />
    <link rel="manifest" href="../images/site.webmanifest" />

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&family=Nunito:ital,wght@0,200..1000;1,200..1000&family=Science+Gothic:wght@100..900&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="../styles/general.css">
    <link rel="stylesheet" href="../styles/topnav.css">
    <link rel="stylesheet" href="../styles/cast-member.css">
    <link rel="stylesheet" href="../styles/media-details.css">
    <link rel="stylesheet" href="../styles/status-messages.css">
    <link rel="stylesheet" href="../styles/side-menu.css">
  </head>
  <body>
    <nav class="topnav">
      <a class="active" href="../index.html">Celestial Cinema</a>

      <div class="search-container">
        <form class="search-form" role="search" id="search-form">
          <input class="search-input" type="search" id="search-query" name="q" placeholder="Search movies | shows | people" autocomplete="off">
        </form>
      </div>
    </nav>

    <div class="cast-member-back">
      <button class="back-button" onclick="history.back()">< Back</button>
    </div>

    <div class="cast-member-container">
      <div class="cast-member-image">
        <img class="cast-member-photo" id="cast-member-photo" src="#">
      </div>
      <div class="cast-member-details">
        <p class="cast-member-name" id="cast-member-name"></p>
        <div class="biography-section">
          <p class="biography-title">Biography</p>
          <p class="biography-text" id="biography-text"></p>
        </div>
        <button class="expand-collapse-btn" id="expand-collapse-btn">
          EXPAND <span class="toggle-chevron">▾</span>
        </button>
      </div>
    </div>

    <div class="known-for-section">
      <p class="known-for-title">Known For</p>
      <div class="known-for-container" id="known-for-container">
        <div class="known-for-loading"></div>
      </div>
    </div>
    
    <script src="../general/sideMenu.js"></script>
    <script src="../general/utils.js"></script>
    <script src="castMember.js"></script>
  </body>
</html>
