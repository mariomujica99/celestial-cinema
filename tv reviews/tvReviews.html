<!DOCTYPE html>
<html lang="en">
  <head>
    <title>Celestial Cinema</title>

    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#7345cc">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <link rel="icon" type="image/png" href="../images/favicon.png">
    <link rel="icon" type="image/svg+xml" href="../images/favicon.svg" />
    <link rel="shortcut icon" href="../images/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="../images/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-title" content="CCMDb" />
    <link rel="manifest" href="../images/site.webmanifest" />

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&family=Nunito:ital,wght@0,200..1000;1,200..1000&family=Science+Gothic:wght@100..900&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="../styles/general.css">
    <link rel="stylesheet" href="../styles/topnav.css">
    <link rel="stylesheet" href="../styles/media-grid.css">
    <link rel="stylesheet" href="../styles/reviews.css">
    <link rel="stylesheet" href="../styles/movie-details.css">
    <link rel="stylesheet" href="../styles/tv-details.css">
    <link rel="stylesheet" href="../styles/media-details.css">
    <link rel="stylesheet" href="../styles/top-cast.css">
    <link rel="stylesheet" href="../styles/status-messages.css">
    <link rel="stylesheet" href="../styles/tv-reviews.css">
    <link rel="stylesheet" href="../styles/modal.css">
    <link rel="stylesheet" href="../styles/side-menu.css">
    <link rel="stylesheet" href="../styles/streaming-providers.css">
    <link rel="stylesheet" href="../styles/videos.css">
  <body>
    <nav class="topnav">
      <a class="active" href="../index.html">Celestial Cinema</a>

      <div class="search-container">
        <form class="search-form" role="search" id="search-form">
          <input class="search-input" type="search" id="search-query" name="q" placeholder="Search movies | shows | people" autocomplete="off">
        </form>
      </div>
    </nav>

    <div class="current-tv-container">
      <div class="current-tv-image">
        <img class="tv-poster" id="tv-poster" src="#">
      </div>
      <div class="current-tv-details">
        <p class="tv-title" id="tv-title"></p>
      </div>
    </div>

    <div class="providers-section" id="providers-section" style="display:none;"></div>

    <div class="videos-section" style="display:none;">
      <div class="videos-header">
        <p class="videos-title">Videos</p>
        <button class="view-all-btn"></button>
      </div>
      <div class="videos-container" id="videos-container">
        <div class="videos-loading"></div>
      </div>
    </div>

    <div class="seasons-section">
      <p class="seasons-title">Seasons</p>
      <div class="seasons-container" id="seasons-container">
        <div class="seasons-loading"></div>
      </div>
    </div>

    <div class="cast-section">
      <div class="cast-header">
        <p class="cast-title">Top Cast</p>
        <button class="full-cast-btn">Full Cast</button>
      </div>

      <div class="cast-container" id="cast-container">
        <div class="cast-loading"></div>
      </div>
    </div>

    <div class="reviews-header">
      <div class="reviews-left">
        <p class="reviews-title">Reviews</p>
      </div>
      <div class="reviews-right">
        <select class="season-filter-dropdown" id="season-filter" onchange="filterReviewsBySeason()">
          <option value="all">All Seasons</option>
        </select>
      </div>
    </div>
    <section id="reviews-container"></section>

    <div class="load-more-container">
      <button id="load-more-btn" class="load-more-btn" style="display: none;">Load More Reviews</button>
    </div>
    
    <script src="../general/sideMenu.js"></script>
    <script src="../general/utils.js"></script>
    <script src="../general/cast.js"></script>
    <script src="../general/videos.js"></script>
    <script src="tvReviews.js"></script>
  </body>
</html>
