<!DOCTYPE html>
<html lang="en">
  <head>
    <title>Celestial Cinema</title>

    <script>
      (function () {
        var t = localStorage.getItem('ccMediaToggle') || 'movie';
        document.documentElement.classList.add('media-toggle-' + t);
      })();
    </script>

    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#7345cc">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <link rel="icon" type="image/png" href="../images/favicon.png">
    <link rel="icon" type="image/svg+xml" href="../images/favicon.svg" />
    <link rel="shortcut icon" href="../images/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="../images/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-title" content="CCMDb" />
    <link rel="manifest" href="../images/site.webmanifest" />

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&family=Nunito:ital,wght@0,200..1000;1,200..1000&family=Science+Gothic:wght@100..900&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="../styles/general.css">
    <link rel="stylesheet" href="../styles/topnav.css">
    <link rel="stylesheet" href="../styles/media-grid.css">
    <link rel="stylesheet" href="../styles/reviews.css">
    <link rel="stylesheet" href="../styles/movie-details.css">
    <link rel="stylesheet" href="../styles/tv-details.css">
    <link rel="stylesheet" href="../styles/media-details.css">
    <link rel="stylesheet" href="../styles/top-cast.css">
    <link rel="stylesheet" href="../styles/all-reviews.css">
    <link rel="stylesheet" href="../styles/filters.css">
    <link rel="stylesheet" href="../styles/status-messages.css">
    <link rel="stylesheet" href="../styles/tv-reviews.css">
    <link rel="stylesheet" href="../styles/modal.css">
    <link rel="stylesheet" href="../styles/modal-review.css">
    <link rel="stylesheet" href="../styles/side-menu.css">
  </head>
  <body>
    <nav class="topnav">
      <a class="active" href="../index.html">Celestial Cinema</a>

      <div class="search-container">
        <form class="search-form" role="search" id="search-form">
          <input class="search-input" type="search" id="search-query" name="q" placeholder="Search movies | shows | people" autocomplete="off">
        </form>
      </div>
    </nav>

    <div class="filters-container">
      <nav class="filters" id="filters-nav">
        <div class="media-toggle" id="media-toggle">
          <button class="toggle-option" id="toggle-movies">Movies</button>
          <button class="toggle-option" id="toggle-tv">Shows</button>
        </div>
        <button class="trending-today-button">Trending</button>
        <button class="popular-button">Popular</button>
        <button class="now-playing-button">Now Playing</button>
        <button class="top-rated-button">Top Rated</button>
        <button class="reviews-button secondary-nav-btn special-btn">Reviews</button>
        <button class="watchlist-button secondary-nav-btn special-btn">Watchlist</button>
      </nav>
      <div class="action-row" id="action-row">
        <button class="reviews-action-button action-row-btn">Reviews</button>
        <button class="watchlist-action-button action-row-btn">Watchlist</button>
      </div>
    </div>

    <div class="search-filters" id="search-filters">
      <button class="search-filters-toggle" id="search-filters-toggle">
        Filter Reviews <span class="toggle-chevron">▾</span>
      </button>
      <div class="search-filters-body" id="search-filters-body">
        <div class="filter-input-container">
          <label for="user-filter">User</label>
          <input type="text" id="user-filter" placeholder="Search name" class="filter-input">
        </div>

        <div class="filter-input-container">
          <label for="media-filter">Media</label>
          <input type="text" id="media-filter" placeholder="Search movie | show" class="filter-input">
        </div>

        <div class="filter-input-container">
          <label for="sort-filter">Sort By</label>
          <select id="sort-filter" class="filter-input">
            <option value="date-newest">Date | newest first</option>
            <option value="date-oldest">Date | oldest first</option>
            <option value="rating-highest">Rating | highest first</option>
            <option value="rating-lowest">Rating | lowest first</option>
          </select>
        </div>
        <button id="search-filters-btn" class="search-filters-btn">Filter</button>
        <button id="clear-filters" class="clear-filters-btn">Clear</button>
      </div>
    </div>

    <p class="reviews-title">Reviews <span id="review-count"></span></p>

    <section id="reviews-container">
    </section>

    <div class="load-more-container">
      <button id="load-more-btn" class="load-more-btn" style="display: none;">Load More Reviews</button>
    </div>
    
    <script src="../general/sideMenu.js"></script>
    <script src="../general/utils.js"></script>
    <script src="../general/reviewModal.js"></script>
    <script src="allReviews.js"></script>
  </body>
</html>
