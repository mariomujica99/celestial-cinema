<!DOCTYPE html>
<html lang="en">
  <head>
    <title>Celestial Cinema</title>

    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#7345cc">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <link rel="icon" type="image/png" href="images/favicon.png">
    <link rel="icon" type="image/svg+xml" href="images/favicon.svg" />
    <link rel="shortcut icon" href="images/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="images/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-title" content="CCMDb" />
    <link rel="manifest" href="images/site.webmanifest" />

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="styles/general.css">
    <link rel="stylesheet" href="styles/topnav.css">
    <link rel="stylesheet" href="styles/media-grid.css">
    <link rel="stylesheet" href="styles/filters.css">
    <link rel="stylesheet" href="styles/status-messages.css">
    <link rel="stylesheet" href="styles/modal.css">
    <link rel="stylesheet" href="styles/side-menu.css">
  </head>
  <body>
    <nav class="topnav">
      <a class="active" href="index.html">Celestial Cinema</a>

      <div class="search-container">
        <form class="search-form" role="search" id="search-form">
          <input class="search-input" type="search" id="search-query" name="q" placeholder="Search Media" autocomplete="off">
        </form>
      </div>
    </nav>

    <div class="filters-container">
      <nav class="filters" id="filters-nav">
        <div class="media-toggle" id="media-toggle">
          <button class="toggle-option" id="toggle-movies">Movies</button>
          <button class="toggle-option" id="toggle-tv">Shows</button>
        </div>
        <button class="trending-today-button">Trending</button>
        <button class="popular-button">Popular</button>
        <button class="now-playing-button">Now Playing</button>
        <button class="top-rated-button">Top Rated</button>
        <button class="reviews-button secondary-nav-btn special-btn">Reviews</button>
        <button class="watchlist-button secondary-nav-btn special-btn">Watchlist</button>
      </nav>
      <div class="action-row" id="action-row">
        <button class="reviews-action-button action-row-btn">Reviews</button>
        <button class="watchlist-action-button action-row-btn">Watchlist</button>
      </div>
      <div class="category-tabs" id="category-tabs" style="display: none;">
        <button class="category-tab" id="tab-movies" data-category="movies">
          Movies <span class="tab-badge" id="count-movies">0</span>
        </button>
        <button class="category-tab" id="tab-tvshows" data-category="tvshows">
          Shows <span class="tab-badge" id="count-tvshows">0</span>
        </button>
        <button class="category-tab" id="tab-people" data-category="people">
          People <span class="tab-badge" id="count-people">0</span>
        </button>
      </div>
    </div>

    <p id="genre-page-title" class="genre-page-title" style="display: none;"></p>

    <section id="media-grid"></section>

    <div class="load-more-container" id="load-more-container" style="display: none;">
      <button class="load-more-btn" id="load-more-btn">Load More</button>
    </div>
    
    <script src="general/sideMenu.js"></script>
    <script src="general/utils.js"></script>
    <script src="index.js"></script>
  </body>
</html>
