<!DOCTYPE html>
<html lang="en">
  <head>
    <title>Celestial Cinema</title>

    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#7345cc">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <link rel="icon" type="image/png" href="images/favicon.png">
    <link rel="icon" type="image/svg+xml" href="images/favicon.svg" />
    <link rel="shortcut icon" href="images/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="images/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-title" content="CCMDb" />
    <link rel="manifest" href="images/site.webmanifest" />

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="styles/general.css">
    <link rel="stylesheet" href="styles/topnav.css">
    <link rel="stylesheet" href="styles/media-grid.css">
    <link rel="stylesheet" href="styles/filters.css">
    <link rel="stylesheet" href="styles/status-messages.css">
  </head>
  <body>
    <nav class="topnav">
      <a class="active" href="index.html">Celestial Cinema</a>

      <div class="search-container">
        <form class="search-form" role="search" id="search-form">
          <input class="search-input" type="search" id="search-query" name="q" placeholder="Search Media" autocomplete="off">
        </form>
      </div>
    </nav>

    <div class="filters-container">
      <div class="scroll-arrow scroll-arrow-left" id="scroll-arrow-left">＜</div>
      <nav class="filters" id="filters-nav">
        <button class="trending-today-button">Trending</button>
        <button class="popular-button">Popular</button>
        <button class="now-playing-button">Now Playing</button>
        <button class="upcoming-button">Upcoming</button>
        <button class="top-rated-button">Top Rated</button>
        <button class="shows-button">TV Shows</button>
        <button class="reviews-button">Reviews</button>
      </nav>
      <div class="scroll-arrow scroll-arrow-right" id="scroll-arrow-right">＞</div>
    </div>

    <section id="media-grid"></section>

    <div class="load-more-container" id="load-more-container" style="display: none;">
      <button class="load-more-btn" id="load-more-btn">Load More</button>
    </div>

    <script src="general/utils.js"></script>
    <script src="index.js"></script>
  </body>
</html>
